kind: module
name: test-agent-sdk-minimal
description: Minimal agent-sdk step test
tags: test,agent-sdk,quick

params:
  - name: target
    required: true
    default: example.com

steps:
  - name: quick-sdk-agent
    type: agent-sdk
    agent: claude-code
    messages:
      - role: user
        content: "Run 'echo hello {{Target}}' and tell me the output."
    exports:
      result: "{{sdk_output}}"
